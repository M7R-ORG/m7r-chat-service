services:
  chat-service:
    image: samarkinivan/chat-service:latest
    container_name: chat-service
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTIONSTRINGS__REDISCONNECTION: "chat-service-redis:6379"
      CONNECTIONSTRINGS__DBCONNECTION: "Host=chat-service-db;Database=ChatDB;Username=postgres;Password=SecretPassword161"
      COMMON__SECRETKEY: "secret_key_88002353535_161"
      CLIENT__BASEURL: "http://147.45.78.164:3000"
      RMQ__HOSTNAME: "host.docker.internal"
      RMQ__USERNAME: "default_user"
      RMQ__PASSWORD: "default_password"
    ports:
      - "8083:8080"
    depends_on:
      - chat-service-db
      - chat-service-redis
    volumes:
      - ./.meta/server/uploads:/uploads

  chat-service-db:
    image: postgres:17
    container_name: chat-service-db
    restart: on-failure
    environment:
      POSTGRES_DB: ChatDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword161
    ports:
      - "5433:5432"
    volumes:
      - ./.meta/postgres/data:/var/lib/postgresql/data

  chat-service-redis:
    image: redis:latest
    container_name: chat-service-redis
    restart: on-failure
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: "password"
      REDIS_PORT: 6379
      REDIS_DATABASES: 16
    volumes:
      - ./.meta/redis/data:/root/redis
      - ./.meta/redis/conf:/usr/local/etc/redis/redis.conf
